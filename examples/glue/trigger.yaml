---
apiVersion: triggers.glue.aws.crossplane.io/v1alpha1
kind: Trigger
metadata:
  name: glue-trigger
spec:
  forProvider:
    region: eu-central-2
    description: "Trigger for Glue"
    triggerType: SCHEDULED
    schedule: "cron(*/30 * * * *)"
    startOnCreation: true
    tags:
      - key: "created-by"
        value: "crossplane"

  providerConfigRef:
    name: example
